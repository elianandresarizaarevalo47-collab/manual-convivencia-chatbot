<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chatbot del Manual de Convivencia</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Encabezado -->
    <header class="encabezado">

        <h1>🤖 Chatbot del Manual de Convivencia</h1>

        <p>Institución Educativa Delicias San Carlos</p>

    </header>

    <!-- Chat -->
    <main class="contenedor-chat">

        <section class="mensajes" id="mensajes">

            <div class="mensaje bot">

                ¡Hola! 👋 Soy el asistente virtual del Manual de Convivencia.
                Pregúntame sobre derechos, deberes, uniforme, convivencia,
                horarios, faltas, debido proceso y cualquier tema del Manual.

            </div>

        </section>

        <section class="entrada">

            <input
                type="text"
                id="pregunta"
                placeholder="Escribe tu pregunta..."
                autocomplete="off">

            <button id="enviar">
                Enviar
            </button>

        </section>

    </main>

    <!-- Base de respuestas temporales -->
    <script src="js/respuestas.js"></script>

    <!-- Motor de búsqueda -->
    <script src="js/buscador.js"></script>

    <!-- Lógica principal -->
    <script src="js/app.js"></script>

</body>

</html>
