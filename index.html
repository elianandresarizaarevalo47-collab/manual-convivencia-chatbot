<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot del Manual de Convivencia</title>

    <!-- Hoja de estilos -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Encabezado -->
    <header class="encabezado">
        <h1>🤖 Chatbot del Manual de Convivencia</h1>
        <p>Institución Educativa Delicias San Carlos</p>
    </header>

    <!-- Contenedor principal -->
    <main class="contenedor-chat">

        <!-- Área de mensajes -->
        <section class="mensajes" id="mensajes">
            <div class="mensaje bot">
                ¡Hola! 👋 Soy tu asistente virtual.
                Pregúntame sobre el Manual de Convivencia.
            </div>
        </section>

        <!-- Área para escribir -->
        <section class="entrada">

            <input
                type="text"
                id="pregunta"
                placeholder="Escribe tu pregunta...">

            <button id="enviar">
                Enviar
            </button>

        </section>

    </main>


    <!-- JavaScript -->
    <!-- Primero carga la memoria del chatbot -->
    <script src="js/respuestas.js"></script>

    <!-- Después carga el funcionamiento del chatbot -->
    <script src="js/app.js"></script>


</body>

</html>
